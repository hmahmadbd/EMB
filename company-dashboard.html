    </nav>

    <div class="p-4 border-t text-center text-sm">
      HM Ahmad Hasan
    </div>

</div>

<script>
(function(){

  // ✅ FAST LOAD (LocalStorage)
  const headerTitle = document.getElementById("headerTitle");
  const savedName = localStorage.getItem("companyName");

  if (savedName) {
    headerTitle.innerText = savedName;
  }

  // ✅ Firebase Sync (Optional update)
  async function updateCompanyName(){
    const userId = localStorage.getItem("userId");
    if(!userId) return;

    try{
      const doc = await db.collection("users").doc(userId).get();
      if(doc.exists && doc.data().companyName){
        const name = doc.data().companyName;
        headerTitle.innerText = name;
        localStorage.setItem("companyName", name);
      }
    }catch(e){
      console.log("Header error:", e);
    }
  }

  updateCompanyName();

  // ✅ Role Control
  const role = localStorage.getItem("userRole") || "worker";
  if(role.toLowerCase().trim() === "company"){
    document.getElementById("companyOnlyContent")?.classList.remove("hidden");
  } else {
    document.getElementById("companyOnlyContent")?.remove();
  }

  // UI
  const menuBtn = document.getElementById("menuButton");
  const sidebar = document.getElementById("sidebar");
  const overlay = document.getElementById("sidebarOverlay");
  const profileBtn = document.getElementById("profileButton");
  const profileMenu = document.getElementById("profileMenu");

  menuBtn.onclick = ()=> {
    sidebar.classList.toggle("-translate-x-full");
    overlay.classList.toggle("hidden");
  };

  overlay.onclick = ()=> {
    sidebar.classList.add("-translate-x-full");
    overlay.classList.add("hidden");
  };

  profileBtn.onclick = (e)=> {
    e.stopPropagation();
    profileMenu.classList.toggle("hidden");
  };

  document.addEventListener("click", (e)=>{
    if(!profileMenu.contains(e.target) && !profileBtn.contains(e.target)){
      profileMenu.classList.add("hidden");
    }
  });

  document.getElementById("logoutBtn").onclick = ()=>{
    localStorage.clear();
    window.location.href = "login.html";
  };

  lucide.createIcons();

})();
</script>

<div class="h-20"></div>

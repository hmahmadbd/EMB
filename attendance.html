<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A S Embroidery - Attendance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <style>
    .modal-backdrop { background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
    #loader { position: fixed; inset: 0; background: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid #4f46e5; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .clickable-row { cursor: pointer; border-bottom: 1px solid #f1f5f9; transition: background 0.2s; }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen pb-10 font-sans text-gray-800">

  <div id="loader">
      <div class="spinner"></div>
      <p class="mt-4 text-indigo-600 font-bold animate-pulse text-[10px] uppercase italic">A S Embroidery</p>
  </div>

  <div id="mainContent" class="opacity-0 transition-opacity duration-500 max-w-6xl mx-auto p-4">

    <div class="mb-6 bg-white p-6 rounded-2xl shadow-sm border-b-4 border-indigo-600 text-center">
      <h1 class="text-3xl font-black text-indigo-700 tracking-tighter uppercase italic">Attendance</h1>
    </div>

    <div id="workerDashboard" class="hidden bg-white p-6 rounded-2xl shadow-lg border-2 border-indigo-100 mb-6 text-center space-y-4">
        <div class="flex justify-between items-center px-2">
             <p class="text-[10px] font-bold text-gray-400 uppercase italic">Status:</p>
             <p id="locIndicator" class="text-[10px] font-black text-rose-500 uppercase italic animate-pulse">Checking GPS...</p>
        </div>
        <div class="flex gap-4">
            <button id="wInBtn" disabled onclick="handleWorkerPunch('in')" class="flex-1 bg-emerald-500 text-white py-5 rounded-2xl font-black text-sm uppercase shadow-md active:scale-95 transition-all">Punch In</button>
            <button id="wOutBtn" disabled onclick="handleWorkerPunch('out')" class="flex-1 bg-rose-500 text-white py-5 rounded-2xl font-black text-sm uppercase shadow-md active:scale-95 transition-all">Punch Out</button>
        </div>
        <p id="punchMessage" class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest"></p>
    </div>

    <div class="bg-white p-5 rounded-xl shadow-sm border border-gray-200 space-y-4">
      <div id="adminCompanyFilter" class="hidden border-b pb-3">
          <label class="text-[9px] font-bold text-amber-600 uppercase">Selected Company</label>
          <select id="companySelectFilter" class="w-full border rounded-lg px-3 py-2 bg-gray-50 text-xs font-bold mt-1 outline-none"></select>
      </div>

      <div class="flex flex-row gap-2">
          <div class="flex-1"><label class="text-[9px] font-bold text-gray-400 uppercase italic">From</label><input id="fromDate" type="date" class="border rounded-lg px-2 py-2 text-xs font-bold w-full outline-none" /></div>
          <div class="flex-1"><label class="text-[9px] font-bold text-gray-400 uppercase italic">To</label><input id="toDate" type="date" class="border rounded-lg px-2 py-2 text-xs font-bold w-full outline-none" /></div>
      </div>

      <div class="flex flex-row gap-2 items-end">
          <div class="flex-[3]"><label class="text-[9px] font-bold text-gray-400 uppercase italic">Worker Filter</label><select id="workerFilter" class="border rounded-lg px-2 py-2 text-xs font-bold w-full outline-none"><option value="all">All Workers</option></select></div>
          <button id="addBtn" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-[10px] font-black uppercase h-[38px] shadow-lg">+ Entry</button>
          <button id="settingsBtn" class="bg-gray-100 text-gray-500 px-3 py-2 rounded-lg h-[38px] border hover:bg-gray-200 transition-colors">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </button>
      </div>
    </div>

    <div id="summary" class="grid grid-cols-2 md:grid-cols-4 gap-3 my-6">
        <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm"><p class="text-[8px] font-bold text-gray-400 uppercase">Records</p><p id="sumRecords" class="text-lg font-black text-indigo-600">0</p></div>
        <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm"><p class="text-[8px] font-bold text-gray-400 uppercase">Work Hours</p><p id="sumHours" class="text-lg font-black text-emerald-600">0h 0m</p></div>
        <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm"><p class="text-[8px] font-bold text-gray-400 uppercase">Absent Hours</p><p id="sumAbsent" class="text-lg font-black text-rose-500">0h 0m</p></div>
        <div class="bg-white p-4 rounded-xl border border-gray-100 shadow-sm"><p class="text-[8px] font-bold text-gray-400 uppercase italic">Total Days</p><p id="sumDays" class="text-lg font-black text-amber-500">0.0</p></div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-200">
      <div class="overflow-x-auto no-scrollbar">
        <table class="w-full text-left">
          <thead class="bg-gray-100 border-b">
            <tr>
              <th class="p-4 font-bold text-gray-500 uppercase text-[9px]">Date</th>
              <th class="p-4 font-bold text-gray-500 uppercase text-[9px]">Worker</th>
              <th class="p-4 font-bold text-gray-500 uppercase text-[9px]">Shift</th>
              <th class="p-4 font-bold text-gray-500 uppercase text-[9px]">Worked</th>
              <th class="p-4 font-bold text-gray-500 uppercase text-[9px]">Absent</th>
            </tr>
          </thead>
          <tbody id="attendanceBody" class="divide-y divide-gray-100"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="modal" class="fixed inset-0 hidden items-center justify-center z-50 p-4">
    <div class="modal-backdrop absolute inset-0" onclick="hide(modal)"></div>
    <form id="attendanceForm" class="relative bg-white rounded-3xl shadow-2xl w-full max-w-md p-6 space-y-4">
      <input type="hidden" id="editDocId">
      <h2 class="text-base font-black text-gray-800 uppercase italic border-b pb-2">Manual Entry</h2>
      
      <div class="grid grid-cols-2 gap-3">
          <input required type="date" id="attDate" onchange="checkExisting()" class="border rounded-xl p-3 bg-gray-50 font-bold text-xs" />
          <select id="attShiftType" class="border rounded-xl p-3 bg-gray-50 font-bold text-xs"><option value="Day">Day</option><option value="Night">Night</option></select>
      </div>
      <select required id="attWorker" onchange="checkExisting()" class="w-full border-2 border-indigo-100 rounded-xl p-3 bg-indigo-50 font-bold text-xs outline-none"></select>
      
      <div class="flex gap-2">
          <button type="button" id="inBtn" disabled onclick="manualPunch('in')" class="flex-1 bg-emerald-500 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-md">Punch In</button>
          <button type="button" id="outBtn" disabled onclick="manualPunch('out')" class="flex-1 bg-rose-500 text-white py-3 rounded-xl font-black text-[10px] uppercase shadow-md">Punch Out</button>
      </div>

      <div id="timeRowsContainer" class="space-y-2 max-h-40 overflow-y-auto no-scrollbar border-y py-3"></div>

      <div class="grid grid-cols-2 gap-4 bg-gray-900 p-4 rounded-2xl text-white">
          <div><p class="text-[8px] font-bold text-gray-400 uppercase">Worked</p><p id="calcWork" class="text-base font-black text-emerald-400">0h 0m</p></div>
          <div class="text-right"><p class="text-[8px] font-bold text-gray-400 uppercase">Absent</p><p id="calcAbsent" class="text-base font-black text-rose-400">12h 0m</p></div>
      </div>
      <div class="flex gap-3">
          <button type="button" onclick="hide(modal)" class="flex-1 py-3 text-gray-400 font-bold text-[10px] uppercase">Cancel</button>
          <button type="submit" id="saveBtn" class="flex-1 bg-indigo-600 text-white py-3 rounded-xl font-bold text-xs uppercase shadow-lg italic">Save Record</button>
      </div>
      <button type="button" id="deleteBtn" class="hidden w-full py-2 text-red-500 font-bold text-[9px] uppercase italic">Delete Record</button>
    </form>
  </div>

  <div id="settingsModal" class="fixed inset-0 hidden items-center justify-center z-50 p-4">
    <div class="modal-backdrop absolute inset-0" onclick="hide(settingsModal)"></div>
    <div class="relative bg-white rounded-3xl shadow-2xl w-full max-w-sm p-6 space-y-5">
      <h2 class="text-base font-black text-indigo-700 uppercase italic border-b pb-2">Company Settings</h2>
      
      <div class="space-y-2">
          <label class="text-[9px] font-bold text-gray-400 uppercase italic">Shift Target Hours</label>
          <input id="setTarget" type="number" step="0.5" class="w-full border rounded-xl p-3 bg-gray-50 font-bold text-xs" />
      </div>

      <div class="space-y-2">
          <label class="text-[9px] font-bold text-amber-600 uppercase italic">Office GPS Coordinates</label>
          <div class="grid grid-cols-2 gap-2">
              <input id="setLat" type="text" placeholder="Latitude" class="border rounded-xl p-3 bg-gray-50 font-bold text-xs" />
              <input id="setLng" type="text" placeholder="Longitude" class="border rounded-xl p-3 bg-gray-50 font-bold text-xs" />
          </div>
          <p class="text-[8px] text-gray-400 italic text-center italic mt-1">*Get coordinates from Google Maps</p>
      </div>

      <div class="flex gap-3 pt-2">
          <button onclick="hide(settingsModal)" class="flex-1 py-3 text-gray-400 font-bold text-[10px] uppercase">Cancel</button>
          <button onclick="saveSettings()" class="flex-1 bg-gray-900 text-white py-3 rounded-xl font-bold text-xs uppercase shadow-lg">Save Settings</button>
      </div>
    </div>
  </div>

  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, query, where, setDoc, deleteDoc, doc, onSnapshot, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCdVxsSPUirznH-67MoHln3kdyPS1SMB94",
      authDomain: "asembroidery-5cd5e.firebaseapp.com",
      projectId: "asembroidery-5cd5e",
      storageBucket: "asembroidery-5cd5e.appspot.com",
      messagingSenderId: "592758047307",
      appId: "1:592758047307:web:d4f7d69bcd9f0398ac83ce"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let workers = [], attendanceData = [], activeCompanyId = null, currentUser = null;
    let isAtOffice = false, officeLoc = { lat: 0, lng: 0 }, globalShiftTarget = 12;

    const showToast = (msg, type = "success") => {
        Toastify({ text: msg, duration: 3000, gravity: "top", position: "center", style: { background: type === "success" ? "#4f46e5" : "#f43f5e", borderRadius: "12px", fontSize: "11px", fontWeight: "bold" } }).showToast();
    };

    // Location Tracking
    const initGeofencing = () => {
        if ("geolocation" in navigator) {
            navigator.geolocation.watchPosition((pos) => {
                const dist = calculateDistance(pos.coords.latitude, pos.coords.longitude, officeLoc.lat, officeLoc.lng);
                const ind = document.getElementById('locIndicator');
                if (dist <= 50) { 
                    isAtOffice = true; ind.innerText = "Verified: Inside Office"; ind.className = "text-[10px] font-black text-emerald-500 uppercase italic";
                } else {
                    isAtOffice = false; ind.innerText = "Error: Outside Range (" + Math.round(dist) + "m)"; ind.className = "text-[10px] font-black text-rose-500 uppercase italic animate-pulse";
                }
                if(currentUser?.role === 'worker') validateWorkerPunchButtons();
            }, (err) => { document.getElementById('locIndicator').innerText = "Turn on GPS Access"; }, { enableHighAccuracy: true });
        }
    };

    const calculateDistance = (lat1, lon1, lat2, lon2) => {
        const R = 6371e3; const p1 = lat1 * Math.PI/180, p2 = lat2 * Math.PI/180;
        const dp = (lat2-lat1) * Math.PI/180, dl = (lon2-lon1) * Math.PI/180;
        const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    };

    onAuthStateChanged(auth, async (user) => {
      if (!user) { window.location.href = "login.html"; return; }
      const q = query(collection(db, "users"), where("uid", "==", user.uid));
      const snap = await getDocs(q);
      if (snap.empty) return;
      currentUser = snap.docs[0].data(); currentUser.docId = snap.docs[0].id;

      if (currentUser.role === 'admin' || currentUser.role === 'company') {
          if (currentUser.role === 'admin') {
              document.getElementById('adminCompanyFilter').classList.remove('hidden');
              const snapC = await getDocs(query(collection(db, "users"), where("role", "==", "company")));
              const sel = document.getElementById('companySelectFilter');
              sel.innerHTML = '<option value="">-- Choose Company --</option>';
              snapC.forEach(d => sel.innerHTML += `<option value="${d.id}">${d.data().name}</option>`);
              sel.onchange = (e) => { 
                  activeCompanyId = e.target.value; 
                  const comp = snapC.docs.find(x => x.id === activeCompanyId).data();
                  setupCompanyData(comp);
              };
          } else {
              activeCompanyId = currentUser.docId; setupCompanyData(currentUser);
          }
      } else {
          // Worker Setup
          activeCompanyId = currentUser.companyId; document.getElementById('workerDashboard').classList.remove('hidden');
          document.getElementById('addBtn').classList.add('hidden');
          document.getElementById('settingsBtn').classList.add('hidden');
          const cSnap = await getDoc(doc(db, "users", activeCompanyId));
          if(cSnap.exists()) setupCompanyData(cSnap.data());
      }
      document.getElementById('loader').style.display = 'none';
      document.getElementById('mainContent').classList.replace('opacity-0', 'opacity-100');
    });

    const setupCompanyData = (comp) => {
        officeLoc = { lat: comp.lat || 0, lng: comp.lng || 0 };
        globalShiftTarget = comp.shiftTarget || 12;
        document.getElementById('setLat').value = officeLoc.lat;
        document.getElementById('setLng').value = officeLoc.lng;
        document.getElementById('setTarget').value = globalShiftTarget;
        loadWorkers(); listenAttendance(); initGeofencing();
    };

    // Shared Functions
    async function loadWorkers() {
      const q = query(collection(db, "users"), where("role", "==", "worker"), where("companyId", "==", activeCompanyId));
      const snap = await getDocs(q); workers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
      const wf = document.getElementById('workerFilter'), aw = document.getElementById('attWorker');
      if(wf) wf.innerHTML = '<option value="all">All Workers</option>';
      if(aw) aw.innerHTML = '<option value="">-- Select Worker --</option>';
      workers.forEach(w => {
          if(wf) wf.innerHTML += `<option value="${w.id}">${w.name}</option>`;
          if(aw) aw.innerHTML += `<option value="${w.id}">${w.name}</option>`;
      });
    }

    function listenAttendance() {
      onSnapshot(query(collection(db, "attendance"), where("companyId", "==", activeCompanyId)), (snap) => {
        attendanceData = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
        render(); if(currentUser?.role === 'worker') validateWorkerPunchButtons();
      });
    }

    // Manual Modal Punch
    window.manualPunch = (type) => {
        const timeStr = new Date().getHours().toString().padStart(2, '0') + ":" + new Date().getMinutes().toString().padStart(2, '0');
        const container = document.getElementById('timeRowsContainer');
        if(type === 'in') {
            const div = document.createElement('div');
            div.className = "flex items-center gap-2 bg-gray-50 p-2 rounded-lg border time-entry-row";
            div.innerHTML = `<input type="time" value="${timeStr}" class="flex-1 bg-transparent font-black text-xs in-time" onchange="recalc()"><span class="text-gray-400 text-[9px]">TO</span><input type="time" class="flex-1 bg-transparent font-black text-xs out-time" onchange="recalc()"><button type="button" onclick="this.parentElement.remove(); recalc(); validateModalBtnState();" class="text-red-400 font-bold px-1">×</button>`;
            container.appendChild(div);
        } else {
            const rows = container.querySelectorAll('.time-entry-row');
            const lastOut = rows[rows.length-1].querySelector('.out-time');
            if(!lastOut.value) lastOut.value = timeStr;
        }
        recalc(); validateModalBtnState();
    };

    const validateModalBtnState = () => {
        const w = document.getElementById('attWorker').value, iBtn = document.getElementById('inBtn'), oBtn = document.getElementById('outBtn');
        if(!w) { iBtn.disabled = oBtn.disabled = true; return; }
        const rows = document.querySelectorAll('.time-entry-row');
        if(rows.length === 0) { iBtn.disabled = false; oBtn.disabled = true; }
        else {
            const lastOut = rows[rows.length-1].querySelector('.out-time').value;
            iBtn.disabled = !lastOut; oBtn.disabled = !!lastOut;
        }
    };

    // Worker Punch (Self Dashboard)
    window.handleWorkerPunch = async (type) => {
        if(!isAtOffice) return;
        const today = new Date().toISOString().split('T')[0], now = new Date().getHours().toString().padStart(2, '0') + ":" + new Date().getMinutes().toString().padStart(2, '0');
        const dId = `${today}_${currentUser.docId}`; const snap = await getDoc(doc(db, "attendance", dId));
        let logs = snap.exists() ? snap.data().timeLogs : [];
        if(type === 'in') logs.push({ in: now, out: "" });
        else if(logs.length > 0) logs[logs.length-1].out = now;
        await setDoc(doc(db, "attendance", dId), {
            companyId: activeCompanyId, date: today, workerId: currentUser.docId, workerName: currentUser.name, shiftTarget: globalShiftTarget, shiftType: "Day", timeLogs: logs, updatedAt: new Date()
        }, { merge: true });
        showToast("Punch Success!");
    };

    const validateWorkerPunchButtons = () => {
        const today = new Date().toISOString().split('T')[0], r = attendanceData.find(i => i.date === today && i.workerId === currentUser.docId);
        const iB = document.getElementById('wInBtn'), oB = document.getElementById('wOutBtn');
        if(!isAtOffice) { iB.disabled = oB.disabled = true; return; }
        if(!r || r.timeLogs.length === 0) { iB.disabled = false; oB.disabled = true; }
        else { const last = r.timeLogs[r.timeLogs.length-1]; iB.disabled = !!last.in && !last.out; oB.disabled = !iB.disabled; }
    };

    // Settings
    window.saveSettings = async () => {
        if(!activeCompanyId) return;
        const lat = parseFloat(document.getElementById('setLat').value), lng = parseFloat(document.getElementById('setLng').value);
        const st = parseFloat(document.getElementById('setTarget').value);
        await updateDoc(doc(db, "users", activeCompanyId), { lat, lng, shiftTarget: st });
        officeLoc = { lat, lng }; globalShiftTarget = st;
        showToast("Settings Updated!"); hide(settingsModal); render();
    };

    const render = () => {
      const s = document.getElementById('fromDate').value, e = document.getElementById('toDate').value, wF = document.getElementById('workerFilter')?.value || 'all';
      let filtered = attendanceData;
      if (currentUser.role === 'worker') filtered = filtered.filter(i => i.workerId === currentUser.docId);
      else if (wF !== 'all') filtered = filtered.filter(i => i.workerId === wF);
      if (s) filtered = filtered.filter(i => i.date >= s); if (e) filtered = filtered.filter(i => i.date <= e);

      let totalM = 0, totalAbsM = 0;
      document.getElementById('attendanceBody').innerHTML = filtered.sort((a,b) => b.date.localeCompare(a.date)).map(i => {
        let tMin = 0; i.timeLogs.forEach(l => {
            if(l.in && l.out) {
                let [sH, sM] = l.in.split(':').map(Number), [eH, eM] = l.out.split(':').map(Number);
                let start = sH * 60 + sM, end = eH * 60 + eM; if(end < start) end += 1440; tMin += (end-start);
            }
        });
        totalM += tMin; const target = (i.shiftTarget || globalShiftTarget) * 60; const abs = Math.max(0, target - tMin); totalAbsM += abs;
        return `<tr onclick="editRecord('${i.docId}')" class="clickable-row">
            <td class="p-4 font-bold text-gray-400 text-[10px]">${i.date.split('-').reverse().join('/')}</td>
            <td class="p-4 font-black text-gray-800 text-xs">${i.workerName}</td>
            <td class="p-4 text-[10px] font-bold text-indigo-600 uppercase italic">${i.shiftType || 'Day'}</td>
            <td class="p-4 font-black text-emerald-600 text-xs">${Math.floor(tMin/60)}h ${tMin%60}m</td>
            <td class="p-4 font-black text-rose-400 text-xs">${Math.floor(abs/60)}h ${abs%60}m</td>
          </tr>`;
      }).join('') || '<tr><td colspan="5" class="p-10 text-center text-gray-300 font-bold italic text-[10px]">No Records Found</td></tr>';

      document.getElementById('sumRecords').innerText = filtered.length;
      document.getElementById('sumHours').innerText = `${Math.floor(totalM/60)}h ${totalM%60}m`;
      document.getElementById('sumAbsent').innerText = `${Math.floor(totalAbsM/60)}h ${totalAbsM%60}m`;
      const tDays = (totalM / (globalShiftTarget * 60)).toFixed(1);
      document.getElementById('sumDays').innerText = tDays;
    };

    window.editRecord = async (id) => {
        if(currentUser.role === 'worker') return; const d = attendanceData.find(i => i.docId === id);
        document.getElementById('attDate').value = d.date; document.getElementById('attWorker').value = d.workerId;
        await checkExisting(); show(modal);
    };

    window.checkExisting = async () => {
        const d = document.getElementById('attDate').value, w = document.getElementById('attWorker').value; if(!d || !w) return;
        const snap = await getDoc(doc(db, "attendance", `${d}_${w}`));
        const container = document.getElementById('timeRowsContainer'); container.innerHTML = "";
        if(snap.exists()){
            const data = snap.data(); document.getElementById('editDocId').value = `${d}_${w}`;
            data.timeLogs.forEach(l => {
                const div = document.createElement('div'); div.className = "flex items-center gap-2 bg-gray-50 p-2 rounded-lg border time-entry-row";
                div.innerHTML = `<input type="time" value="${l.in}" class="flex-1 bg-transparent font-black text-xs in-time" onchange="recalc()"><span class="text-gray-400 text-[9px]">TO</span><input type="time" value="${l.out || ''}" class="flex-1 bg-transparent font-black text-xs out-time" onchange="recalc()"><button type="button" onclick="this.parentElement.remove(); recalc(); validateModalBtnState();" class="text-red-400 font-bold px-1">×</button>`;
                container.appendChild(div);
            });
            document.getElementById('deleteBtn').classList.remove('hidden');
        } else { document.getElementById('editDocId').value = ""; document.getElementById('deleteBtn').classList.add('hidden'); }
        recalc(); validateModalBtnState();
    };

    window.recalc = () => {
        let totalMin = 0;
        document.querySelectorAll('.time-entry-row').forEach(row => {
            const i = row.querySelector('.in-time').value, o = row.querySelector('.out-time').value;
            if(i && o) {
                let [sH, sM] = i.split(':').map(Number), [eH, eM] = o.split(':').map(Number);
                let s = sH * 60 + sM, e = eH * 60 + eM; if(e < s) e += 1440; totalMin += (e - s);
            }
        });
        document.getElementById('calcWork').innerText = `${Math.floor(totalMin/60)}h ${totalMin%60}m`;
        const abs = Math.max(0, (globalShiftTarget*60)-totalMin); document.getElementById('calcAbsent').innerText = `${Math.floor(abs/60)}h ${abs%60}m`;
    };

    document.getElementById('attendanceForm').onsubmit = async (e) => {
        e.preventDefault(); const btn = document.getElementById('saveBtn'); btn.disabled = true;
        const date = document.getElementById('attDate').value, wId = document.getElementById('attWorker').value;
        const logs = []; document.querySelectorAll('.time-entry-row').forEach(row => {
            const i = row.querySelector('.in-time').value, o = row.querySelector('.out-time').value;
            if(i) logs.push({ in: i, out: o || "" });
        });
        await setDoc(doc(db, "attendance", `${date}_${wId}`), {
            companyId: activeCompanyId, date, workerId: wId, shiftTarget: globalShiftTarget,
            shiftType: document.getElementById('attShiftType').value, workerName: document.getElementById('attWorker').options[document.getElementById('attWorker').selectedIndex].text,
            timeLogs: logs, updatedAt: new Date()
        });
        showToast("Data Saved Successfully!"); hide(modal); btn.disabled = false;
    };

    document.getElementById('deleteBtn').onclick = async () => { if(confirm("Are you sure?")) { await deleteDoc(doc(db, "attendance", document.getElementById('editDocId').value)); hide(modal); showToast("Deleted", "error"); } };
    document.getElementById('addBtn').onclick = () => { document.getElementById('attendanceForm').reset(); document.getElementById('timeRowsContainer').innerHTML = ""; document.getElementById('attDate').value = new Date().toISOString().split('T')[0]; show(modal); };
    document.getElementById('settingsBtn').onclick = () => show(settingsModal);

    // Initial Date Filter
    const today = new Date();
    document.getElementById('fromDate').value = new Date(today.getFullYear(), today.getMonth(), 1).toISOString().split('T')[0];
    document.getElementById('toDate').value = new Date(today.getFullYear(), today.getMonth() + 1, 0).toISOString().split('T')[0];

    document.getElementById('fromDate').onchange = render;
    document.getElementById('toDate').onchange = render;
    document.getElementById('workerFilter').onchange = render;
    window.hide = m => m.classList.replace('flex', 'hidden'); const show = m => m.classList.replace('hidden', 'flex');
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Worker Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
</head>
<body class="bg-gray-100 p-2 md:p-4 text-gray-800">

  <div class="max-w-md mx-auto">
    
    <div class="bg-white p-4 rounded-2xl shadow-sm border border-blue-100 mb-3">
      <div class="flex justify-between items-center mb-3">
        <div>
          <h1 id="userName" class="text-xl font-bold text-gray-800 leading-none">লোড হচ্ছে...</h1>
          <p id="userRank" class="text-xs text-blue-600 font-semibold mt-1 uppercase">পদবি লোড হচ্ছে...</p>
        </div>
        <div class="text-right">
          <p class="text-[10px] text-gray-400 uppercase font-bold">Main Balance</p>
          <p id="mainBalance" class="text-xl font-black text-green-600">0 ৳</p>
        </div>
      </div>
      
      <div class="grid grid-cols-2 gap-2 border-t pt-3">
        <div class="bg-blue-50 p-2 rounded-lg text-center">
          <p class="text-[9px] text-blue-400 font-bold uppercase">User ID</p>
          <p id="displayUserId" class="text-sm font-bold text-blue-700">--</p>
        </div>
        <div class="bg-indigo-50 p-2 rounded-lg text-center">
          <p class="text-[9px] text-indigo-400 font-bold uppercase">Company ID</p>
          <p id="displayCompId" class="text-sm font-bold text-indigo-700">--</p>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-2 mb-3">
      <div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-blue-500">
        <p class="text-[10px] text-gray-400 font-bold">প্রাপ্য স্যালারি</p>
        <p id="rankSalary" class="text-lg font-bold text-gray-800">0 ৳</p>
      </div>
      <div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-purple-500">
        <p class="text-[10px] text-gray-400 font-bold">সমন্বয় স্যালারি</p>
        <p id="adjSalary" class="text-lg font-bold text-purple-600">0 ৳</p>
      </div>
      <div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-orange-400">
        <p class="text-[10px] text-gray-400 font-bold">বোনাস</p>
        <p id="totalBonus" class="text-lg font-bold text-gray-800">0 ৳</p>
      </div>
      <div class="bg-white p-3 rounded-xl shadow-sm border-l-4 border-red-500">
        <p class="text-[10px] text-gray-400 font-bold">লস স্যালারি</p>
        <p id="lossSalary" class="text-lg font-bold text-red-600">0 ৳</p>
      </div>
    </div>

    <div class="grid grid-cols-2 gap-2 mb-4">
      <div class="bg-green-100 p-2 rounded-lg flex justify-between items-center px-4">
        <span class="text-[11px] text-green-700 font-bold">উপস্থিত:</span>
        <span id="attCount" class="text-sm font-black text-green-700">0</span>
      </div>
      <div class="bg-red-100 p-2 rounded-lg flex justify-between items-center px-4">
        <span class="text-[11px] text-red-700 font-bold">অনুপস্থিত:</span>
        <span id="absentCount" class="text-sm font-black text-red-700">0</span>
      </div>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="bg-gray-50 p-3 border-b flex items-center justify-between">
        <h2 class="text-[11px] font-bold text-gray-500 uppercase">ডেইলি রিপোর্ট</h2>
        <div class="flex gap-1">
          <input type="date" id="dateFrom" class="text-[10px] border p-1 rounded outline-none w-24">
          <input type="date" id="dateTo" class="text-[10px] border p-1 rounded outline-none w-24">
        </div>
      </div>

      <div class="max-h-60 overflow-y-auto">
        <table class="w-full text-[12px] text-left">
          <thead class="bg-gray-100 sticky top-0">
            <tr>
              <th class="p-2 border-b text-gray-500">তারিখ</th>
              <th class="p-2 border-b text-gray-500">অবস্থা</th>
              <th class="p-2 border-b text-right text-gray-500">ব্যালেন্স</th>
            </tr>
          </thead>
          <tbody id="dataTableBody" class="divide-y"></tbody>
        </table>
      </div>
    </div>

    <button onclick="firebase.auth().signOut()" class="w-full mt-4 text-[10px] text-gray-400 font-bold uppercase tracking-widest py-2 hover:text-red-500 transition">Log Out Account</button>
  </div>

  <script>
    // ১. Firebase Config
    const firebaseConfig = {
        apiKey: "AIzaSyCdVxsSPUirznH-67MoHln3kdyPS1SMB94",
        authDomain: "asembroidery-5cd5e.firebaseapp.com",
        projectId: "asembroidery-5cd5e",
        storageBucket: "asembroidery-5cd5e.appspot.com",
        messagingSenderId: "592758047307",
        appId: "1:592758047307:web:d4f7d69bcd9f0398ac83ce"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const auth = firebase.auth();

    // ২. ডেট ফিল্টার সেটআপ
    const dateFrom = document.getElementById('dateFrom');
    const dateTo = document.getElementById('dateTo');
    const now = new Date();
    dateFrom.value = new Date(now.getFullYear(), now.getMonth(), 1).toISOString().split('T')[0];
    dateTo.value = now.toISOString().split('T')[0];

    // ৩. ডাটা ফেচিং
    auth.onAuthStateChanged(async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        db.collection("users").where("uid", "==", user.uid).onSnapshot(snapshot => {
            if(!snapshot.empty) updateUI(snapshot.docs[0].data());
        });
    });

    function updateUI(d) {
        document.getElementById('userName').innerText = d.name || "N/A";
        document.getElementById('userRank').innerText = d.rank || "Staff";
        document.getElementById('displayUserId').innerText = d.userId || '--';
        document.getElementById('displayCompId').innerText = d.companyId || '--';
        document.getElementById('rankSalary').innerText = `${d.rankSalary || 0} ৳`;
        document.getElementById('mainBalance').innerText = `${d.balance || 0} ৳`;

        renderTable(d.logs || []);
    }

    function renderTable(logs) {
        const tbody = document.getElementById('dataTableBody');
        tbody.innerHTML = '';
        
        let bonusTotal = 0, lossTotal = 0, adjTotal = 0, pDays = 0, aDays = 0;
        const start = dateFrom.value;
        const end = dateTo.value;

        logs.forEach(log => {
            if (log.date >= start && log.date <= end) {
                if (log.status === 'Present') pDays++; else aDays++;
                
                bonusTotal += (log.bonus || 0);
                lossTotal += (log.loss || 0);
                adjTotal += (log.adjSalary || 0);

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50">
                        <td class="p-2 border-b">${log.date.substring(5)}</td>
                        <td class="p-2 border-b font-bold ${log.status === 'Present' ? 'text-green-600' : 'text-red-500'}">${log.status}</td>
                        <td class="p-2 border-b text-right font-medium">${(log.bonus || 0) + (log.adjSalary || 0) - (log.loss || 0)} ৳</td>
                    </tr>`;
            }
        });

        document.getElementById('totalBonus').innerText = bonusTotal + ' ৳';
        document.getElementById('lossSalary').innerText = lossTotal + ' ৳';
        document.getElementById('adjSalary').innerText = adjTotal + ' ৳';
        document.getElementById('attCount').innerText = pDays;
        document.getElementById('absentCount').innerText = aDays;
    }

    dateFrom.addEventListener('change', () => location.reload());
    dateTo.addEventListener('change', () => location.reload());
  </script>
</body>
</html>

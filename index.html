<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading System...</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --primary-color: #4f46e5; /* Indigo-600 */
            --bg-color: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg-color);
            overflow: hidden;
            font-family: sans-serif;
        }

        #loader {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* স্মার্ট স্পিনার */
        .spinner {
            position: relative;
            width: 60px;
            height: 60px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* অতিরিক্ত পালসিং ইফেক্ট */
        .spinner::after {
            content: '';
            position: absolute;
            top: -4px; left: -4px; right: -4px; bottom: -4px;
            border-radius: 50%;
            border: 4px solid var(--primary-color);
            opacity: 0.2;
            animation: pulse-ring 1.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p class="mt-6 text-indigo-700 font-bold animate-pulse uppercase tracking-widest text-[11px]">
            সিস্টেম লোড হচ্ছে...
        </p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ফায়ারবেস কনফিগারেশন
        const firebaseConfig = {
            apiKey: "AIzaSyCdVxsSPUirznH-67MoHln3kdyPS1SMB94",
            authDomain: "asembroidery-5cd5e.firebaseapp.com",
            projectId: "asembroidery-5cd5e",
            storageBucket: "asembroidery-5cd5e.appspot.com",
            messagingSenderId: "592758047307",
            appId: "1:592758047307:web:d4f7d69bcd9f0398ac83ce"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        /**
         * রিডাইরেক্ট ফাংশন
         */
        function redirectUser(role) {
            const routes = {
                "company": "company-dashboard.html",
                "worker": "worker-dashboard.html",
                "admin": "admin-dashboard.html",
                "supplier": "supplier-dashboard.html",
                "client": "client-dashboard.html"
            };
            const target = routes[role] || "login.html";
            
            // সামান্য ডিলে দিয়ে রিডাইরেক্ট (স্মুথ ট্রানজিশন)
            setTimeout(() => {
                window.location.replace(target);
            }, 800);
        }

        // ১. লোকাল স্টোরেজ চেক (ইন্সট্যান্ট অ্যাকশন)
        const cachedRole = localStorage.getItem("userRole");
        if (cachedRole) {
            redirectUser(cachedRole);
        }

        // ২. ফায়ারবেস অথেনটিকেশন চেক
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                try {
                    // ইমেইল দিয়ে Firestore-এ সার্চ
                    const usersRef = collection(db, "users");
                    const q = query(usersRef, where("email", "==", user.email));
                    const querySnapshot = await getDocs(q);

                    if (!querySnapshot.empty) {
                        const userData = querySnapshot.docs[0].data();
                        const role = userData.role;

                        // নতুন রোল সেভ করা
                        localStorage.setItem("userRole", role);

                        // যদি ক্যাশ করা রোলের সাথে অমিল থাকে তবেই রিডাইরেক্ট করবে
                        if (cachedRole !== role) {
                            redirectUser(role);
                        }
                    } else {
                        // ইউজার ডাটাবেসে না থাকলে লগইন পেজে
                        window.location.replace("login.html");
                    }
                } catch (error) {
                    console.error("Firebase Error:", error);
                    window.location.replace("login.html");
                }
            } else {
                // সেশন না থাকলে ক্লিয়ারেন্স
                localStorage.removeItem("userRole");
                // যদি পেজটি এখনই রিডাইরেক্ট না হয়ে থাকে (ক্যাশে ডাটা না থাকলে)
                if (!cachedRole) {
                    window.location.replace("login.html");
                }
            }
        });
    </script>
</body>
</html>
